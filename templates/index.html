<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Speech App</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 500px;
            background: #1f2937;
            padding: 30px;
            border-radius: 15px;
        }

        textarea{
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        select, button{
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        button{
            background-color: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .result{
            margin-top: 20px;
            background: #374151;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Native Speech App</h1>

        <form method="POST">

            <textarea name="text" placeholder="Type your sentence here..."></textarea>

            <select name="emotion">
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="angry">Angry</option>
                <option value="calm">Calm</option>
            </select>

            <button type="submit">
                Make it sound native
            </button>

        </form>

        {% if result %}
        <div class="result">
            <h3>Native Version:</h3>
            <p>{{ result }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
